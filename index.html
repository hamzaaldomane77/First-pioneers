<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- تضمين الخطوط بشكل مباشر بدلاً من الاعتماد على Google Fonts -->
    <style>
      /* تضمين خط Russo One مباشرة */
      @font-face {
        font-family: 'Russo One';
        font-style: normal;
        font-weight: 400;
        src: local('Russo One'), local('RussoOne'),
             url('/fonts/RussoOne-Regular.woff2') format('woff2'),
             url('/fonts/RussoOne-Regular.woff') format('woff');
        font-display: swap;
      }
      
      /* استخدام خطوط النظام كاحتياط */
      body {
        font-family: 'Russo One', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
    </style>
    
    <!-- إعدادات الأمان والمصادر المسموح بها -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' http: https: data:; font-src 'self' data:; connect-src 'self' http://first.pioneers.admin.techpundits.net; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    
    <!-- السماح بالطلبات من أي مصدر -->
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>First-pioneers</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
